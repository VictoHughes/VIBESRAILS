# vibesrails - Scale up your vibe coding safely
# Single source of truth for security & quality patterns
#
# Usage:
#   python3 scripts/vibesrails.py --show     # voir patterns
#   python3 scripts/vibesrails.py --all      # scanner tout
#   python3 scripts/vibesrails.py            # scanner staged (pre-commit)

version: "1.0"


# ═══════════════════════════════════════════════════════════════
# 🔒 SECURITY - Bloque le commit
# ═══════════════════════════════════════════════════════════════
blocking:
  - id: hardcoded_secret
    name: "Hardcoded Secret"
    regex: "(api_key|password|secret|token|pwd|passwd)\\s*=\\s*[\"'][^\"']{4,}"
    flags: "i"
    message: "Secret hardcodé - utiliser variables d'environnement"

  - id: sql_injection
    name: "SQL Injection"
    regex: "\\.execute\\s*\\([^)]*f[\"']"
    message: "SQL injection - utiliser requêtes paramétrées"

  - id: shell_injection
    name: "Shell Injection"
    regex: "shell\\s*=\\s*True"
    message: "shell=True dangereux - utiliser subprocess avec liste"

  - id: unsafe_yaml
    name: "Unsafe YAML"
    regex: "yaml\\.load\\s*\\("
    exclude_regex: "Loader\\s*="
    message: "Utiliser yaml.safe_load()"

  - id: unsafe_numpy
    name: "Unsafe NumPy"
    regex: "allow_pickle\\s*=\\s*True"
    message: "Permet exécution de code arbitraire"

# ═══════════════════════════════════════════════════════════════
# ⚠️ WARNINGS - Signalé mais autorisé
# ═══════════════════════════════════════════════════════════════
warning:
  - id: star_import
    name: "Star Import"
    regex: "from\\s+\\S+\\s+import\\s+\\*"
    message: "Éviter star imports"
    skip_in_tests: true

  - id: none_comparison
    name: "None Comparison"
    regex: "==\\s*None"
    message: "Utiliser 'is None'"
    skip_in_tests: true

  - id: bare_except
    name: "Bare Except"
    regex: "except\\s*:"
    message: "Attraper exceptions spécifiques"
    skip_in_tests: true

# ═══════════════════════════════════════════════════════════════
# 🐛 BUGS - Patterns causant des bugs silencieux
# ═══════════════════════════════════════════════════════════════
bugs:
  - id: mutable_default
    name: "Mutable Default (B006)"
    regex: "def \\w+\\([^)]*=\\s*\\[\\]|def \\w+\\([^)]*=\\s*\\{\\}"
    message: "Mutable default partagé entre appels"
    level: "BLOCK"

  - id: assert_in_prod
    name: "Assert in Production"
    regex: "^\\s*assert\\s+(?!.*#.*test)"
    message: "assert ignoré avec python -O"
    level: "WARN"
    skip_in_tests: true

# ═══════════════════════════════════════════════════════════════
# 🏗️ ARCHITECTURE - Règles projet
# ═══════════════════════════════════════════════════════════════
architecture:
  - id: dip_domain_infra
    name: "DIP Violation (Domain → Infrastructure)"
    regex: "from backend\\.infrastructure"
    scope: ["backend/domain/**/*.py"]
    message: "Domain ne doit pas importer Infrastructure (Dependency Inversion Principle)"
    level: "BLOCK"

  - id: dip_domain_application
    name: "DIP Violation (Domain → Application)"
    regex: "from backend\\.application"
    scope: ["backend/domain/**/*.py"]
    message: "Domain ne doit pas importer Application (Dependency Inversion Principle)"
    level: "BLOCK"

# ═══════════════════════════════════════════════════════════════
# 🔧 MAINTENABILITÉ
# ═══════════════════════════════════════════════════════════════
maintainability:
  - id: print_debug
    name: "Print Debug"
    regex: "^\\s*print\\(.*debug|^\\s*print\\(f?[\"']\\s*(DEBUG|TODO|FIXME)"
    message: "Print oublié - utiliser logging"
    level: "WARN"

# ═══════════════════════════════════════════════════════════════
# ✅ EXCEPTIONS
# ═══════════════════════════════════════════════════════════════
exceptions:
  test_files:
    patterns: ["test_*.py", "*_test.py", "**/tests/**/*.py"]
    allowed: ["hardcoded_secret", "shell_injection", "mutable_default"]
    reason: "Tests peuvent mocker patterns dangereux"

# Complexity (enforced by scanner)
complexity:
  max_file_lines: 300    # WARN if file exceeds this (test files excluded)
  max_function_lines: 50 # For future use

# ═══════════════════════════════════════════════════════════════
# 🤖 GUARDIAN - AI Coding Safety
# ═══════════════════════════════════════════════════════════════
guardian:
  enabled: true            # Activate Guardian Mode
  auto_detect: true        # Auto-detect AI coding sessions
  warnings_as_blocking: false  # Escalate warnings to blocking in AI mode
  senior_mode: "off"       # "off" | "auto" | "always"
                           # auto = run when AI session detected
                           # always = run on every scan
  # stricter_patterns: []  # Additional patterns for AI mode

# ═══════════════════════════════════════════════════════════════
# 📋 ASSERTIONS - Project truth validation
# ═══════════════════════════════════════════════════════════════
# Uncomment and customize to enforce project decisions.
# Run: vibesrails --check-assertions
#
# assertions:
#   values:                    # Grep code for expected values
#     llm_model: "gpt-4o"
#     max_retries: 3
#   rules:                     # Structural checks
#     fail_closed: true        # No silent except/pass
#     single_entry_point: true # At most 1 if __name__ == '__main__'
#   baselines:                 # Metrics thresholds
#     test_count: 100          # Minimum test count
#     zero_regressions: true   # All tests must pass
