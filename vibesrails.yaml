# vibesrails - Scale up your vibe coding safely
# Single source of truth for security & quality patterns
#
# Usage:
#   vibesrails --show     # voir patterns
#   vibesrails --all      # scanner tout
#   vibesrails            # scanner staged (pre-commit)

version: "1.0"


# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџ”’ SECURITY - Bloque le commit
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
blocking:
  - id: hardcoded_secret
    name: "Hardcoded Secret"
    regex: "(api_key|password|secret|token|pwd|passwd)\\s*=\\s*[\"'][^\"']{4,}"
    flags: "i"
    message: "Secret hardcode - utiliser variables d'environnement"

  - id: sql_injection
    name: "SQL Injection"
    regex: "\\.execute\\s*\\([^)]*f[\"']"
    message: "SQL injection - utiliser requetes parametrees"

  - id: command_injection
    name: "Command Injection"
    regex: "(os\\.system|subprocess\\.call|subprocess\\.run|eval)\\s*\\([^)]*f[\"']"
    message: "Command injection - sanitizer les inputs ou utiliser des alternatives safe"

  - id: shell_injection
    name: "Shell Injection"
    regex: "shell\\s*=\\s*True"
    message: "shell=True dangereux - utiliser subprocess avec liste"

  - id: unsafe_yaml
    name: "Unsafe YAML"
    regex: "yaml\\.load\\s*\\("
    exclude_regex: "Loader\\s*="
    message: "Utiliser yaml.safe_load()"

  - id: unsafe_numpy
    name: "Unsafe NumPy"
    regex: "allow_pickle\\s*=\\s*True"
    message: "Permet execution de code arbitraire"

  - id: debug_mode_prod
    name: "Debug Mode in Production"
    regex: "DEBUG\\s*=\\s*True"
    flags: "i"
    message: "Debug mode active - mettre DEBUG=False en production"
    scope: ["**/settings.py", "**/config.py"]

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# вљ пёЏ WARNINGS - Signale mais autorise
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
warning:
  - id: star_import
    name: "Star Import"
    regex: "from\\s+\\S+\\s+import\\s+\\*"
    message: "Eviter star imports"
    skip_in_tests: true

  - id: none_comparison
    name: "None Comparison"
    regex: "==\\s*None"
    message: "Utiliser 'is None'"
    skip_in_tests: true

  - id: print_statement
    name: "Print Statement"
    regex: "^\\s*print\\("
    message: "Utiliser logging au lieu de print"
    skip_in_tests: true

  - id: bare_except
    name: "Bare Except"
    regex: "except:\\s*$"
    message: "Attraper exceptions specifiques"
    skip_in_tests: true

  - id: todo_comment
    name: "TODO Comment"
    regex: "#\\s*TODO"
    flags: "i"
    message: "TODO trouve - creer une tache"
    skip_in_tests: false

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџђ› BUGS - Patterns causant des bugs silencieux
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
bugs:
  - id: mutable_default
    name: "Mutable Default (B006)"
    regex: "def \\w+\\([^)]*=\\s*\\[\\]|def \\w+\\([^)]*=\\s*\\{\\}"
    message: "Mutable default partage entre appels"
    level: "BLOCK"

  - id: assert_in_prod
    name: "Assert in Production"
    regex: "^\\s*assert\\s+(?!.*#.*test)"
    message: "assert ignore avec python -O"
    level: "WARN"
    skip_in_tests: true

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџЏ—пёЏ ARCHITECTURE - DIP & import restrictions
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
architecture:
  - id: dip_domain_infra
    name: "DIP Violation (Domain в†’ Infrastructure)"
    regex: "from backend\\.infrastructure"
    scope: ["backend/domain/**/*.py"]
    message: "Domain ne doit pas importer Infrastructure (Dependency Inversion Principle)"
    level: "BLOCK"

  - id: dip_domain_application
    name: "DIP Violation (Domain в†’ Application)"
    regex: "from backend\\.application"
    scope: ["backend/domain/**/*.py"]
    message: "Domain ne doit pas importer Application (Dependency Inversion Principle)"
    level: "BLOCK"

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџ”§ MAINTENABILITE
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
maintainability:
  - id: print_debug
    name: "Print Debug"
    regex: "^\\s*print\\(.*debug|^\\s*print\\(f?[\"']\\s*(DEBUG|TODO|FIXME)"
    message: "Print oublie - utiliser logging"
    level: "WARN"

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# вњ… EXCEPTIONS
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
exceptions:
  test_files:
    patterns:
      - "test_*.py"
      - "*_test.py"
      - "tests/**/*.py"
    allowed:
      - "hardcoded_secret"
      - "sql_injection"
      - "command_injection"
      - "shell_injection"
      - "mutable_default"
    reason: "Tests peuvent mocker patterns dangereux"

  cli_files:
    patterns:
      - "**/cli.py"
      - "mcp_server.py"
    allowed:
      - "print_statement"
    reason: "CLI/MCP entry points use print() for user output"

  config_files:
    patterns:
      - "**/settings.py"
      - "**/config.py"
    allowed:
      - "star_import"
    reason: "Config files may use star imports"

# Complexity (enforced by scanner)
complexity:
  max_file_lines: 400    # WARN if file exceeds this (test files excluded)
  max_function_lines: 50 # For future use

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџ¤– GUARDIAN - AI Coding Safety
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
guardian:
  enabled: true
  auto_detect: true
  warnings_as_blocking: false
  senior_mode: "auto"  # Run Senior Mode when AI session detected
  max_file_lines: 300  # PreToolUse BLOCKS writes exceeding this (split into modules)

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџЋ›пёЏ SESSION PROFILES - Override adapter defaults per mode
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# session_profiles:
#   rnd:
#     file_too_long:
#       threshold: 800          # override default 600
#   bugfix:
#     diff_size:
#       warn: 30                # stricter than default 50

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# рџ“‹ ASSERTIONS - Project truth validation
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
assertions:
  values:
    version: "2.2.2"           # Current version string in code
    mcp_sdk: "FastMCP"         # MCP SDK pattern used
  rules:
    fail_closed: true          # No silent except/pass
    fail_closed_allow:         # Intentional graceful degradation
      - "core/hallucination_registry.py:78"
      - "core/hallucination_deep.py:70"
      - "vibesrails/assertions.py"
      - "vibesrails/sync_claude.py:184"
      - "vibesrails/hooks/post_tool_use.py"
      - "vibesrails/hooks/pre_tool_use.py"
      - "tests/"
  baselines:
    test_count: 2203           # Minimum test count
